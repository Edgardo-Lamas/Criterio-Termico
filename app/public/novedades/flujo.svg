<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="El flujo de cálculo de la obra en cuatro pasos">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151b38"/>
      <stop offset="1" stop-color="#1d2547"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg2)"/>
  <!-- línea del flujo -->
  <path d="M100 180H540" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="3" stroke-linecap="round"/>
  <!-- flechas entre nodos -->
  <g stroke="#e94560" stroke-width="2.5" stroke-linecap="round" fill="none" stroke-opacity="0.8">
    <path d="M156 180h44m-10-7 10 7-10 7"/>
    <path d="M288 180h44m-10-7 10 7-10 7"/>
    <path d="M420 180h44m-10-7 10 7-10 7"/>
  </g>
  <!-- nodo 1: potencia (llama) -->
  <g>
    <circle cx="128" cy="180" r="34" fill="#1a2144" stroke="#e94560" stroke-width="3"/>
    <path d="M124 196c-6-3-9-9-7-15 1-4 4-6 6-10 1 4 4 6 6 9 3 5 2 12-5 16z" fill="#e94560"/>
    <text x="128" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.75">Potencia</text>
  </g>
  <!-- nodo 2: caudal (gota) -->
  <g>
    <circle cx="260" cy="180" r="34" fill="#1a2144" stroke="#e94560" stroke-width="3"/>
    <path d="M260 162c7 9 12 15 12 22a12 12 0 1 1-24 0c0-7 5-13 12-22z" fill="none" stroke="#e94560" stroke-width="3" stroke-linejoin="round"/>
    <text x="260" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.75">Caudal</text>
  </g>
  <!-- nodo 3: diámetros (caño en corte) -->
  <g>
    <circle cx="392" cy="180" r="34" fill="#1a2144" stroke="#e94560" stroke-width="3"/>
    <ellipse cx="380" cy="180" rx="7" ry="14" fill="none" stroke="#e94560" stroke-width="3"/>
    <path d="M380 166h26m-26 28h26m4-14a7 14 0 0 1-4 12" fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
    <text x="392" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.75">Diámetros</text>
  </g>
  <!-- nodo 4: bomba (voluta con impulsor) -->
  <g>
    <circle cx="524" cy="180" r="34" fill="#1a2144" stroke="#e94560" stroke-width="3"/>
    <circle cx="524" cy="180" r="14" fill="none" stroke="#e94560" stroke-width="3"/>
    <path d="M524 166v-8m0 44v-8m14-14h8m-44 0h8" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
    <path d="M524 174l6 6-6 6-6-6z" fill="#e94560"/>
    <text x="524" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.75">Bombas</text>
  </g>
  <!-- numeración -->
  <g font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">
    <circle cx="104" cy="152" r="11" fill="#e94560"/>
    <text x="104" y="157" text-anchor="middle">1</text>
    <circle cx="236" cy="152" r="11" fill="#e94560"/>
    <text x="236" y="157" text-anchor="middle">2</text>
    <circle cx="368" cy="152" r="11" fill="#e94560"/>
    <text x="368" y="157" text-anchor="middle">3</text>
    <circle cx="500" cy="152" r="11" fill="#e94560"/>
    <text x="500" y="157" text-anchor="middle">4</text>
  </g>
  <text x="320" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#ffffff" fill-opacity="0.55" letter-spacing="3">EL ORDEN DE LA OBRA</text>
</svg>
