name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck, Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Typecheck
        working-directory: ./app
        run: npx tsc --noEmit

      - name: Lint
        working-directory: ./app
        run: npm run lint

      - name: Tests
        working-directory: ./app
        run: npm run test -- --run

# El deploy ahora lo hace Vercel automáticamente en cada push a main
# (integración Git de Vercel, root directory: app).
